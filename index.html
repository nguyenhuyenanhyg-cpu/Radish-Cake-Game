<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hành trình học tiếng Trung: Đi làm thêm ở Đài Loan</title>
    <style>
        /* ================= GLOBAL STYLES ================= */
        :root {
            --primary-blue: #4A90E2;
            --hover-blue: #357ABD;
            --success-green: #2ECC71;
            --error-red: #E74C3C;
            --orange-main: #ff9800;
            --orange-hover: #e65100;
            --bg-color: #F4F7F6;
            --card-bg: #FFFFFF;
            --text-main: #333333;
            --text-muted: #666666;
            --border: #E0E0E0;
            --chat-bg: #749cbd;
            --chat-player: #85e04b;
        }

        body {
            font-family: 'Segoe UI', Arial, 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .hidden { display: none !important; }
        .screen { flex: 1; display: flex; flex-direction: column; width: 100%; height: 100%; overflow: hidden; }
        
        .btn { border: none; padding: 12px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-weight: bold;}
        .btn-blue { background-color: var(--primary-blue); color: white; width: 100%; margin-top: 15px;}
        .btn-blue:hover:not(:disabled) { background-color: var(--hover-blue); }
        .btn-orange { background: var(--orange-main); color: white; padding: 15px 40px; font-size: 20px; border-radius: 50px; box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);}
        .btn-orange:hover { background: var(--orange-hover); transform: translateY(-3px); }

        /* ================= LOBBY SCREEN (MENU) ================= */
        #lobby-screen { align-items: center; justify-content: center; background: #fffcf5; background-image: radial-gradient(var(--orange-main) 1px, transparent 1px); background-size: 20px 20px; overflow-y: auto;}
        .title-box { text-align: center; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 4px solid var(--orange-main); margin-bottom: 30px;}
        .title-box h1 { color: var(--orange-hover); font-size: 36px; margin: 0 0 10px 0; }
        
        .stage-grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 1000px; padding: 20px;}
        .stage-card { background: white; padding: 30px 20px; border-radius: 15px; text-align: center; border: 3px solid #ccc; cursor: pointer; transition: 0.3s; width: 160px; position: relative;}
        .stage-card.unlocked { border-color: var(--success-green); box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3); }
        .stage-card.unlocked:hover { transform: translateY(-5px); background: #f0fdf0; }
        .stage-card.locked { opacity: 0.6; cursor: not-allowed; background: #eee;}
        .lock-icon { position: absolute; top: 10px; right: 10px; font-size: 20px;}

        /* ================= READING & QUIZ SCREEN ================= */
        #reading-screen { align-items: center; padding: 2vh 20px; overflow: hidden; background-color: var(--bg-color);}
        
        /* Cấu trúc Container giới hạn chiều cao 96vh để không bị scroll toàn trang */
        .reading-container { 
            background-color: var(--card-bg); 
            max-width: 1200px; 
            width: 95%; 
            height: 96vh; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.08); 
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
        }
        
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 10px;}
        .nav-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px;}
        .nav-btn:hover { color: var(--primary-blue); }

        /* Bố cục 2 Cột: Trái (Bài đọc) - Phải (Ảnh + Quiz) */
        .reading-layout { display: flex; gap: 30px; flex: 1; overflow: hidden; margin-top: 10px;}
        
        /* Cột Trái: Cuộn độc lập */
        .text-panel { flex: 1.4; overflow-y: auto; padding-right: 15px; font-size: 1.2em; line-height: 2.2;}
        
        /* Cột Phải: Ảnh trên, Quiz dưới */
        .right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .image-panel { flex-shrink: 0; margin-bottom: 15px; }
        .image-panel img { width: 100%; height: 220px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        /* Khung Quiz tự cuộn (nếu màn hình quá bé), nhưng thiết kế tiêu chuẩn sẽ vừa in */
        #quiz-section { 
            flex: 1; 
            overflow-y: auto; 
            background: #f8fbff; 
            padding: 15px 20px; 
            border-radius: 10px; 
            border: 2px solid var(--primary-blue); 
            display: flex; 
            flex-direction: column;
        }

        ruby { ruby-align: center; margin-right: 2px; }
        rt { font-size: 0.6em; color: #888; font-family: Arial, sans-serif; transition: opacity 0.3s; }
        .hide-pinyin rt { opacity: 0; user-select: none; }
        .speaker { font-weight: bold; color: var(--primary-blue); }

        #quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .option-btn { background-color: white; color: var(--text-main); border: 2px solid var(--border); text-align: left; padding: 10px 12px; font-size: 15px; border-radius: 6px; cursor: pointer; transition: 0.2s;}
        .option-btn:hover:not(:disabled) { border-color: var(--primary-blue); background-color: #F8FBFF; }
        .option-btn.correct { border-color: var(--success-green); background-color: #EAFBF1; }
        .option-btn.wrong { border-color: var(--error-red); background-color: #FDEDED; }
        .hint-box { padding: 10px; border-radius: 6px; background: #fff3e0; border-left: 4px solid var(--orange-main); display: none; font-size: 0.95em;}

        @media (max-width: 768px) { 
            .reading-container { height: auto; min-height: 100vh; overflow-y: auto;}
            .reading-layout { flex-direction: column; overflow: visible; } 
            .text-panel, .right-panel, #quiz-section { overflow: visible; flex: none; }
            .image-panel img { height: auto; }
            #quiz-options { grid-template-columns: 1fr; }
        }

        /* ================= TRANSITION SCREEN ================= */
        #transition-screen { align-items: center; justify-content: center; background: rgba(0,0,0,0.8); position: absolute; z-index: 100; color: white; text-align: center; padding: 20px;}
        .trans-box { background: white; color: var(--text-main); padding: 40px; border-radius: 15px; max-width: 500px;}

        /* ================= CHAT LINE GAME ================= */
        #top-bar-chat { display: flex; justify-content: space-between; align-items: center; background: #333; color: white; padding: 10px 20px; font-size: 16px; font-weight: bold;}
        #chat-main-content { display: flex; flex: 1; overflow: hidden; }
        
        #chat-container { width: 40%; background: var(--chat-bg); display: flex; flex-direction: column; border-right: 2px solid #ccc; position: relative; }
        #chat-history { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth;}
        
        .message { padding: 12px 16px; border-radius: 15px; max-width: 85%; font-size: 16px; line-height: 1.5; box-shadow: 0 1px 2px rgba(0,0,0,0.1); display: flex; flex-direction: column;}
        .boss-msg { align-self: flex-start; background: #ffffff; border-top-left-radius: 0; }
        .player-msg { align-self: flex-end; background: var(--chat-player); border-top-right-radius: 0; }
        .speaker-name { font-weight: bold; margin-bottom: 5px; border-bottom: 1px solid #eee; padding-bottom: 3px; font-size: 14px; color: #555;}
        
        .play-audio-btn { background: #f0f0f0; border: none; cursor: pointer; font-size: 16px; padding: 5px; border-radius: 50%; margin-left: 10px;}
        
        .choices-area { background: #ebf0f5; padding: 15px; border-top: 2px solid #ccc; display: flex; flex-direction: column; gap: 10px; max-height: 40%; overflow-y: auto;}
        .chat-choice-btn { padding: 12px; cursor: pointer; border: 2px solid var(--chat-bg); border-radius: 8px; background: white; font-size: 15px; text-align: left; transition: 0.2s;}
        .chat-choice-btn:hover { background: #e8f4f8; border-color: var(--orange-main); transform: translateX(5px);}

        #game-container { width: 60%; background: #fffcf5; padding: 30px; display: flex; flex-direction: column; align-items: center;}
        .env-item { font-size: 80px; padding: 20px; background: rgba(255,255,255,0.7); border: 3px dashed #ccc; border-radius: 20px; margin-top: 50px;}

        @keyframes blink { 0% { opacity: .2; } 20% { opacity: 1; } 100% { opacity: .2; } }
        .typing-dot { font-size: 24px; line-height: 10px; animation: blink 1.4s infinite both; }
        .typing-dot:nth-child(2) { animation-delay: .2s; } .typing-dot:nth-child(3) { animation-delay: .4s; }

        @media (max-width: 768px) { #chat-container { width: 100%; } #game-container { display: none; } }
    </style>
</head>
<body>

    <div id="lobby-screen" class="screen">
        <div class="title-box">
            <h1>🍜 Hệ thống Học tập</h1>
            <p style="color: #666; font-size: 18px; margin-top:0;">Đọc hiểu & Trải nghiệm làm thêm tại Đài Loan</p>
        </div>
        <div class="stage-grid" id="stage-grid-container"></div>
    </div>

    <div id="reading-screen" class="screen hidden">
        <div class="reading-container">
            <div class="nav-bar">
                <button class="nav-btn" onclick="backToLobby()">⬅️ Quay lại Bản đồ</button>

            </div>
            
            <h2 id="reading-title" style="color: var(--primary-blue); margin-top:0;"></h2>
            
            <div id="reading-layout-box" class="reading-layout">
                <div class="text-panel" id="reading-content"></div>
                
                <div class="right-panel">
                    <div class="image-panel">
                        <img id="reading-image" src="" alt="Illustration">
                    </div>
                    <div id="quiz-section">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <h3 style="color: var(--primary-blue); margin: 0;">📝 Kiểm tra Đọc hiểu</h3>
                            <div id="quiz-progress" style="color: var(--text-muted); font-size: 0.9em; font-weight: bold;"></div>
                        </div>
                        <p style="margin-top:0;"><strong id="quiz-question-text" style="font-size: 1.1em;"></strong></p>
                        
                        <div id="quiz-options"></div>
                        <div id="quiz-hint" class="hint-box"></div>
                        <button id="btn-next-quiz" class="btn btn-blue hidden" onclick="nextQuizQuestion()">Câu tiếp theo ➔</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="transition-screen" class="screen hidden">
        <div class="trans-box">
            <h2 style="color: var(--success-green); margin-top:0;">🎉 Chúc mừng!</h2>
            <p style="font-size: 18px; line-height: 1.6;">Bạn đã hoàn thành phần Đọc hiểu xuất sắc.</p>
            <p style="font-size: 18px; line-height: 1.6; color: var(--orange-hover); font-weight: bold;">Bây giờ hãy vận dụng kiến thức để đến quán ăn phụ việc cho Ông chủ nhé!</p>
            <button class="btn btn-orange" style="margin-top: 20px;" onclick="startChatMode()">Bắt đầu làm thêm ➔</button>
        </div>
    </div>

    <div id="chat-screen" class="screen hidden">
        <div id="top-bar-chat">
            <span id="chat-progress-text">Nhiệm vụ: 1</span>
            <span id="chat-score-text">Độ tin cậy: 0</span>
            <button class="btn" style="background:var(--error-red); color:white; padding:5px 10px;" onclick="backToLobby()">Thoát</button>
        </div>
        <div id="chat-main-content">
            <div id="chat-container">
                <div id="chat-history"></div>
                <div class="choices-area hidden" id="chat-choices"></div>
            </div>
            <div id="game-container">
                <h2 id="chat-scene-title" style="color: #333; border-bottom: 3px solid var(--orange-main); padding-bottom: 10px;">...</h2>
                <div id="chat-interactive" class="env-item"></div>
            </div>
        </div>
    </div>

    <div id="review-screen" class="screen hidden" style="align-items: center; justify-content: center; background: rgba(0,0,0,0.8); position: absolute; z-index: 200;">
        <div style="background: white; padding: 40px; border-radius: 15px; max-width: 600px; width: 90%;">
            <h2 style="color: var(--orange-hover); text-align: center; border-bottom: 2px solid var(--orange-main); padding-bottom: 10px; margin-top:0;">📝 Tổng kết Ca làm việc</h2>
            <ul id="grammar-points" style="font-size: 18px; line-height: 1.8; color: #333;"></ul>
            <div style="text-align: center; margin-top: 30px;">
                <button class="btn btn-orange" onclick="finishStage()">Nhận lương & Quay về Bản đồ ➔</button>
            </div>
        </div>
    </div>

                    },
                    {
                        q: "這段對話主要在介紹什麼？",
                        opts: ["怎麼自己在家做台灣傳統食物。", "台灣傳統食物蘿蔔糕的意思和特色。", "台灣人過年會去哪裡排隊買東西。", "馬丁在台灣的早生活和習慣。"],
                        ansIdx: 1,
                        hintZh: "想想兩個人一直在聊什麼食物，還有它的意義。",
                        hintVi: "Suy nghĩ xem hai người họ liên tục nói về món ăn nào, cùng ý nghĩa của nó."

                ],
                chatLogic: {
                    grammarReview: [
                        "<strong>找 vs 找到：</strong>「找」 là hành động (tìm kiếm),「找到」 là kết quả (đã tìm thấy).",
                        "<strong>看 vs 看到：</strong>「看」 là hành động (nhìn/xem),「看到」 là kết quả (đã nhìn thấy).",
                        "<strong>恰恰 (Chià-chià)：</strong> Từ tiếng Đài Loan, diễn tả đồ ăn được chiên vàng giòn bề mặt.",
                        "<strong>菜頭 (Tshài-thâu)：</strong> Củ cải trong tiếng Đài, phát âm giống「彩頭」(Điềm lành)."
                    ],
                    tasks: [
                        {   
                            taskName: "Nhiệm vụ 1: Tìm nguyên liệu",
                            speakerIcon: "👨‍🍳 老闆",

                            interactHtml: `🥬 🦐 🍄`,
                            choices: [
                                { textZh: "老闆，我找蝦米了。", replyZh: "你是說你「找」了，那到底是有沒有「找到」呢？你再確實跟我報告一次！", isCorrect: false },

                                { textZh: "老闆，我看到蝦米了！", replyZh: "太好了！你學得很快。拿出來準備做蘿蔔糕吧。👍", isCorrect: true }

                        {

                            interactHtml: `🌾 vs 🍚`,
                            choices: [
                                { textZh: "老闆，我加麵粉了。", replyZh: "哎呀，加成「麵粉」了嗎？中文的粉類很多，容易搞混。我們是用「在來米粉」喔。沒關係，我們重新調一盆，你再去拿「在來米粉」過來試試看？", isCorrect: false },
                                { textZh: "老闆，我加在來米粉了。", replyZh: "沒錯！就是加「在來米粉」，你記得很清楚，準備下鍋囉。💯", isCorrect: true }
                            ]
                        },
                        {   
                            taskName: "Nhiệm vụ 3: Kỹ thuật chiên",
                            speakerIcon: "👨‍🍳 老闆",
                            textZh: "蘿蔔糕要煎得「恰恰」才好吃。你看看鍋裡，表皮看起來怎麼樣了？",
                            interactHtml: `🍳`,
                            choices: [
                                { textZh: "表皮吃起來恰恰的！", replyZh: "現在還在鍋子裡，很燙，還不能「吃」喔！你再用眼睛觀察一下，換個說法試試看？", isCorrect: false },
                                { textZh: "表皮看起來恰恰的！", replyZh: "用對了！看起來顏色很漂亮，準備端給客人吧。", isCorrect: true }

                        },
                        {   
                            taskName: "Nhiệm vụ 4: Phục vụ khách Tây",
                            speakerIcon: "👱‍♂️ 馬丁",
                            textZh: "你好！我聽說台灣人過年吃蘿蔔糕，為什麼呢？",
                            interactHtml: `🍽️`,
                            choices: [
                                { textZh: "因為我會做，所以你應該吃。", replyZh: "哇，你「會做」很厲害！不過，我是想問為什麼台灣人過年要吃蘿蔔糕呢？是不是有特別的意思？你再想想看？", isCorrect: false },
                                { textZh: "因為蘿蔔叫菜頭，吃蘿蔔糕，新的一年會有好運氣！", replyZh: "原來如此！你的中文解釋得很好，那我買兩份！🤩", isCorrect: true }

                }
            },
            2: { title: "Bài 2: 年糕 (Bánh Tổ)" },
            3: { title: "Bài 3: 佛跳牆 (Phật Nhảy Tường)" },
            4: { title: "Bài 4: 蒸魚 (Cá Hấp)" }
        };

        /* ================= STATE MANAGEMENT ================= */
        let unlockedStages = 1;
        let activeStage = 1;
        
        // Quiz State
        let currentQuizIndex = 0;
        let quizAttempts = 0;
        
        // Chat State
        let currentTaskIndex = 0;
        let chatScore = 0;
        let firstTryChat = true;
        const synth = window.speechSynthesis;

        // Initialize App
        window.onload = () => {
            let savedProgress = localStorage.getItem('taiwan_game_progress');
            if(savedProgress) unlockedStages = parseInt(savedProgress);
            renderLobby();
        };

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
        }

        /* ================= 1. LOBBY LOGIC ================= */
        function renderLobby() {
            const grid = document.getElementById('stage-grid-container');
            grid.innerHTML = '';
            
            const icons = ["🥢", "🥞", "🍲", "🐟"];
            
            for(let i = 1; i <= 4; i++) {
                let isUnlocked = i <= unlockedStages;
                let card = document.createElement('div');
                card.className = `stage-card ${isUnlocked ? 'unlocked' : 'locked'}`;
                
                let lockIcon = isUnlocked ? '' : '<div class="lock-icon">🔒</div>';
                
                card.innerHTML = `
                    ${lockIcon}
                    <div style="font-size: 40px; margin-bottom: 10px;">${icons[i-1]}</div>
                    <h3 style="margin:0; font-size: 16px;">${MASTER_DATA[i].title}</h3>
                `;
                
                if(isUnlocked) {
                    card.onclick = () => startReadingMode(i);
                }
                grid.appendChild(card);
            }
            switchScreen('lobby-screen');
        }

        function backToLobby() {
            synth.cancel();
            renderLobby();
        }

        /* ================= 2. READING & QUIZ LOGIC ================= */
        function startReadingMode(stageId) {
            if(!MASTER_DATA[stageId].readingHtml) {
                alert("Nội dung bài này đang được cập nhật (Giai đoạn 2)!");
                return;
            }
            activeStage = stageId;
            const data = MASTER_DATA[stageId];
            
            document.getElementById('reading-title').innerText = data.title;
            document.getElementById('reading-content').innerHTML = data.readingHtml;
            document.getElementById('reading-image').src = data.image;
            document.getElementById('reading-content').classList.remove('hide-pinyin');
            
            currentQuizIndex = 0;
            renderQuiz();
            switchScreen('reading-screen');
        }

        function togglePinyin() {
            document.getElementById('reading-content').classList.toggle('hide-pinyin');
        }

        function renderQuiz() {
            const data = MASTER_DATA[activeStage].quiz[currentQuizIndex];
            quizAttempts = 0;

            document.getElementById('quiz-progress').innerText = `Câu ${currentQuizIndex + 1}/${MASTER_DATA[activeStage].quiz.length}`;
            document.getElementById('quiz-question-text').innerText = data.q;
            
            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            document.getElementById('quiz-hint').style.display = 'none';
            document.getElementById('btn-next-quiz').classList.add('hidden');

            data.opts.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn option-btn';
                btn.innerText = opt;
                btn.onclick = () => handleQuizAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function handleQuizAnswer(selectedIndex, btnElement) {
            const data = MASTER_DATA[activeStage].quiz[currentQuizIndex];
            const hintBox = document.getElementById('quiz-hint');
            const nextBtn = document.getElementById('btn-next-quiz');

            if (selectedIndex === data.ansIdx) {
                btnElement.classList.add('correct');
                hintBox.style.display = 'block';
                hintBox.style.borderLeftColor = 'var(--success-green)';
                hintBox.innerHTML = '<strong style="color:var(--success-green);">Chính xác!</strong>';
                
                document.querySelectorAll('#quiz-options .btn').forEach(b => b.disabled = true);
                
                if(currentQuizIndex === MASTER_DATA[activeStage].quiz.length - 1) {
                    nextBtn.innerText = 'Hoàn thành Đọc hiểu ➔';
                }
                nextBtn.classList.remove('hidden');
            } else {
                quizAttempts++;
                btnElement.classList.add('wrong');
                btnElement.disabled = true;
                
                hintBox.style.display = 'block';
                hintBox.style.borderLeftColor = 'var(--error-red)';
                
                if (quizAttempts === 1) {
                    hintBox.innerHTML = `<strong style="color:var(--error-red);">Chưa đúng!</strong> ${data.hintZh}<br><i style="color:#666;">(${data.hintVi})</i>`;
                } else {
                    hintBox.innerHTML = '<strong style="color:var(--error-red);">Sai 2 lần. Chúng ta xem câu tiếp theo nhé!</strong>';
                    document.querySelectorAll('#quiz-options .btn').forEach(b => {
                        b.disabled = true;
                        if(data.opts.indexOf(b.innerText) === data.ansIdx) b.classList.add('correct');
                    });
                    if(currentQuizIndex === MASTER_DATA[activeStage].quiz.length - 1) {
                        nextBtn.innerText = 'Hoàn thành Đọc hiểu ➔';
                    }
                    nextBtn.classList.remove('hidden');
                }
            }
        }

        function nextQuizQuestion() {
            currentQuizIndex++;
            if (currentQuizIndex < MASTER_DATA[activeStage].quiz.length) {
                renderQuiz();
            } else {
                switchScreen('transition-screen');
            }
        }

        /* ================= 3 & 4. CHAT GAME LOGIC ================= */
        function startChatMode() {
            currentTaskIndex = 0;
            chatScore = 0;
            document.getElementById('chat-history').innerHTML = ''; 
            switchScreen('chat-screen');
            loadChatTask();
        }

        function updateChatUI() {
            const totalTasks = MASTER_DATA[activeStage].chatLogic.tasks.length;
            document.getElementById('chat-progress-text').innerText = `Nhiệm vụ: ${currentTaskIndex + 1} / ${totalTasks}`;
            document.getElementById('chat-score-text').innerText = `Độ tin cậy: ${chatScore}`;
        }

        function loadChatTask() {
            const chatLogic = MASTER_DATA[activeStage].chatLogic;
            if (currentTaskIndex >= chatLogic.tasks.length) {
                showGrammarReview();
                return;
            }

            const task = chatLogic.tasks[currentTaskIndex];
            firstTryChat = true;
            updateChatUI();
            
            document.getElementById('chat-scene-title').innerText = task.taskName;
            document.getElementById('chat-interactive').innerText = task.interactHtml;
            document.getElementById('chat-choices').classList.add('hidden');
            
            // Boss Typing Effect
            setTimeout(() => {
                showTypingIndicator();
                setTimeout(() => {
                    hideTypingIndicator();
                    addChatMessage(task.speakerIcon, task.textZh, false);
                    renderChatChoices(task);
                }, 1500); 
            }, 500); 
        }

        function renderChatChoices(task) {
            const container = document.getElementById('chat-choices');
            container.innerHTML = ''; 
            container.classList.remove('hidden'); 

            task.choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'chat-choice-btn';
                btn.innerHTML = `💬 ${choice.textZh}`;
                btn.onclick = () => handleChatAnswer(choice, task);
                container.appendChild(btn);
            });
            scrollToBottom();
        }

        function handleChatAnswer(choice, task) {
            document.getElementById('chat-choices').classList.add('hidden'); 
            addChatMessage("👩‍💼 我", choice.textZh, true);

            setTimeout(() => {
                showTypingIndicator();
                setTimeout(() => {
                    hideTypingIndicator();
                    if(choice.isCorrect) {
                        chatScore += firstTryChat ? 10 : 5;
                        addChatMessage(task.speakerIcon, choice.replyZh, false);
                        updateChatUI();
                        currentTaskIndex++;
                        setTimeout(loadChatTask, 2000); 
                    } else {
                        chatScore -= 2;
                        firstTryChat = false;
                        addChatMessage(task.speakerIcon, choice.replyZh, false);
                        updateChatUI();
                        setTimeout(() => renderChatChoices(task), 2000); 
                    }
                }, 1500);
            }, 500);
        }

        /* --- Chat Engine Utilities --- */
        function showTypingIndicator() {
            hideTypingIndicator();
            const chatHistory = document.getElementById('chat-history');
            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = `message boss-msg`;
            typingDiv.style.width = 'fit-content';
            typingDiv.style.padding = '8px 16px';
            typingDiv.innerHTML = '<span class="typing-dot">.</span><span class="typing-dot">.</span><span class="typing-dot">.</span>';
            chatHistory.appendChild(typingDiv);
            scrollToBottom();
        }

        function hideTypingIndicator() {
            const ind = document.getElementById('typing-indicator');
            if (ind) ind.remove();
        }

        function addChatMessage(speakerName, textZh, isPlayer) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isPlayer ? 'player-msg' : 'boss-msg'}`;
            const safeText = textZh.replace(/'/g, "\\'").replace(/"/g, '&quot;');

            msgDiv.innerHTML = `
                <div class="speaker-name">${speakerName}</div>
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <span>${textZh}</span>
                    <button class="play-audio-btn" onclick="speakChinese('${safeText}')">🔊</button>
                </div>
            `;
            
            const chatHistory = document.getElementById('chat-history');
            const ind = document.getElementById('typing-indicator');
            if (ind) chatHistory.insertBefore(msgDiv, ind);
            else chatHistory.appendChild(msgDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            const chatHistory = document.getElementById('chat-history');
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        function speakChinese(text) {
            synth.cancel(); 
            let cleanText = text.replace(/<[^>]*>?/gm, ''); 
            const utterance = new SpeechSynthesisUtterance(cleanText.trim());
            utterance.lang = 'zh-TW'; 
            synth.speak(utterance);
        }

        /* ================= 5. REVIEW & SAVE LOGIC ================= */
        function showGrammarReview() {
            const chatLogic = MASTER_DATA[activeStage].chatLogic;
            const ul = document.getElementById('grammar-points');
            ul.innerHTML = '';
            
            chatLogic.grammarReview.forEach(point => {
                const li = document.createElement('li');
                li.innerHTML = point;
                li.style.marginBottom = "10px";
                ul.appendChild(li);
            });
            
            document.getElementById('review-screen').classList.remove('hidden');
        }

        function finishStage() {
            document.getElementById('review-screen').classList.add('hidden');
            if(activeStage === unlockedStages && unlockedStages < 4) {
                unlockedStages++;
                localStorage.setItem('taiwan_game_progress', unlockedStages);
            }
            backToLobby();
        }
    </script>
